<!DOCTYPE html>
<html>
<head>
<title>MCBLOX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

<div class="menu-btn" onclick="location.href='menu.html'">☰</div>

<div class="logo">
<img src="mcblox.png">
</div>

<div class="nav-right">
<a href="bloxcoin.html">🪙<span id="coinDisplay">0</span></a>
</div>

</div>

<div class="glow-card">
<h2>📅 Events</h2>
<p><b>Summer Event 2026 ☀️</b></p>
<ul>
<li>New items</li>
<li>Effects</li>
<li>Screens</li>
</ul>
</div>

<div class="glow-card">
<h2>👥 Friends</h2>
<button onclick="location.href='addfriend.html'">Add Friend +</button>
</div>

<div class="glow-card">
<h2>🎮 Games</h2>
<p>Steal a Block</p>
<button>PLAY</button>
</div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

auth.onAuthStateChanged(async (user)=>{
  if(user){
    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("coinDisplay").innerText = snap.data().coins || 0;
    }
  }
});
</script>

</body>
</html>
