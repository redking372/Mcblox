<!DOCTYPE html>
<html>
<head>
<title>MCBLOX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="navbar">

<div class="menu-btn" onclick="location.href='menu.html'">☰</div>

<div class="logo">
<img src="mcblox.png">
</div>

<div class="nav-right">
<a href="bloxcoin.html">🪙<span id="coinDisplay">0</span></a>
</div>

</div>

<div class="glow-card">
<div class="event-card">

  <div class="event-header">
    <img src="Images/event-icon.png" class="event-icon">
    <h2>Events</h2>
  </div>

  <div class="event-body">
    <img src="event-banner.png" class="event-banner">

    <div class="event-info">
      <h3>Summer Event 2026</h3>
      <p>New items, effects and screens available now.</p>
    </div>

  </div>

</div>
<p><b>Summer Event 2026 ☀️</b></p>
<ul>
<li>New items</li>
<li>Effects</li>
<li>Screens</li>
</ul>
</div>

<div class="glow-card">
<h2>👥 Friends</h2>
<button onclick="location.href='addfriend.html'">Add Friend +</button>
</div>

<div class="glow-card">
<h2>🎮 Games</h2>
<p>Steal a Block</p>
<button class="button-with-icon" onclick="playClick(this)">
  <svg viewBox="0 0 24 24">
    <path fill="white" d="M8 5v14l11-7z"/>
  </svg>
  <span class="text">Play</span>
</button>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

auth.onAuthStateChanged(async (user)=>{
  if(user){
    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("coinDisplay").innerText = snap.data().coins || 0;
    }
  }
});
</script>

</body>
<script>
function playClick(btn) {
  // add click animation
  btn.style.transform = "scale(0.9)";
  btn.style.filter = "brightness(0.9)";

  // wait 200ms then go page
  setTimeout(() => {
    window.location.href = "404.html"; // change later to game.html
  }, 200);
}
</script>
</html>
