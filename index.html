<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCBLOX</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #050505;
    color: #eaeaea;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    background: #0a0a0a;
    box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.left-icons span {
    margin-right: 10px;
    cursor: pointer;
    font-size: 18px;
}

/* LOGO IMAGE */
.logo img {
    height: 28px;
}

/* RIGHT */
.coin {
    background: #111;
    padding: 6px 12px;
    border-radius: 20px;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* CARDS */
.card {
    background: #0f0f0f;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 0 15px rgba(0,255,195,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* BUTTON */
button {
    background: #00ffc3;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px #00ffc3;
}

button:hover {
    background: #00e6b0;
}

/* TEXT */
h2 {
    margin-top: 0;
}

.small {
    color: #aaa;
    font-size: 14px;
}
</style>

</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="left-icons">
        <span onclick="openMenu()">☰</span>
        <span onclick="openInbox()">📩</span>
    </div>

    <!-- LOGO IMAGE CENTER -->
    <div class="logo">
        <img src="mcblox.png" alt="MCBLOX Logo">
    </div>

    <div class="coin">🪙 100+</div>
</div>

<div class="container">

    <!-- EVENTS -->
    <div class="card">
        <h2>📅 Events</h2>
        <h3>Summer Event 2026 ☀️</h3>
        <ul>
            <li>New items</li>
            <li>Effects</li>
            <li>Screens / Backgrounds</li>
        </ul>
        <p class="small">Ends July 2026</p>
    </div>

    <!-- FRIENDS -->
    <div class="card">
        <h2>👥 Friends</h2>
        <button onclick="window.location.href='addfriend.html'">Add Friend +</button>
        <p class="small">Search username to add friends.</p>
    </div>

    <!-- GAMES -->
    <div class="card">
        <h2>🎮 Games</h2>
        <h3>Steal a Block</h3>
        <button>PLAY</button>
    </div>

</div>

<script>
function openMenu(){
    window.location.href = "menu.html";
}

function openInbox(){
    window.location.href = "inbox.html";
}
</script>

</body>
      </html>
