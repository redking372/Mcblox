<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCBLOX</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
background:#1e1e1e;
padding:10px;
color:white;
position:fixed;
top:0;
width:100%;
z-index:1000;
}

/* ADD SPACE BELOW NAVBAR */

.container{
padding:15px;
margin-top:70px;
}

/* NAVBAR SECTIONS */

.left{
display:flex;
gap:15px;
align-items:center;
}

.center{
flex:1;
text-align:center;
}

.right{
display:flex;
gap:10px;
align-items:center;
}

.logo{
height:35px;
}

.coin{
background:#444;
padding:5px 10px;
border-radius:20px;
font-size:14px;
}

/* CARDS */

.card{
background:white;
border-radius:8px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.button{
background:#2ecc71;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<div class="left">
<div onclick="location.href='menu.html'">☰</div>
<div onclick="location.href='inbox.html'">📩</div>
</div>

<div class="center">
<img src="logo.png" class="logo">
</div>

<div class="right">
<div class="coin">🪙 100+</div>
<div>👤</div>
</div>

</div>

<div class="container">

<div class="card">
<h3>Events 📅</h3>

<b>Summer Event 2026 ☀</b>

<ul>
<li>New items</li>
<li>Effects</li>
<li>Screens / Backgrounds</li>
</ul>

<small>Ends July 2026</small>

</div>

<div class="card">

<h3>Friends</h3>

<button class="button">Add Friend +</button>

<p style="font-size:12px;color:#777;">
Search username to add friends.
</p>

</div>

<div class="card">

<h3>Games</h3>

<b>Steal a Block</b>

<br><br>

<button class="button">PLAY</button>

</div>

</div>

</body>
</html>
