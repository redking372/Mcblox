<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basket</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="content">

<h2>Your Basket</h2>

<div id="items"></div>

<h3>Total Coins: <span id="coins">0</span></h3>
<h3>Total Price: $<span id="price">0</span></h3>

<img src="upi.png" width="200"><br><br>

<button onclick="pay()">I Paid</button>

</div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let totalCoins = 0;
let totalPrice = 0;

let itemsDiv = document.getElementById("items");

cart.forEach(item=>{
  totalCoins += item.coins;
  totalPrice += item.price;

  itemsDiv.innerHTML += `<p>${item.coins} Coins - $${item.price}</p>`;
});

document.getElementById("coins").innerText = totalCoins;
document.getElementById("price").innerText = totalPrice.toFixed(2);

async function pay(){

const user = auth.currentUser;

if(!user){
  alert("Login first!");
  window.location.href="login.html";
  return;
}

const ref = doc(db, "users", user.uid);
const snap = await getDoc(ref);

let currentCoins = 0;

if(snap.exists()){
  currentCoins = snap.data().coins || 0;
}

await updateDoc(ref, {
  coins: currentCoins + totalCoins
});

localStorage.removeItem("cart");

alert("✅ Coins added!");

window.location.href="index.html";
}

window.pay = pay;
</script>

</body>
</html>
