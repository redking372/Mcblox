<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MC Blox | Settings</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">MC Blox</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="settings.html" class="active">Settings</a>
        </div>
    </nav>

    <div class="container">
        <h1>Settings</h1>
        
        <div class="section-card">
            <h3>User Profile</h3>
            <p style="color: var(--gray);">Manage your account details here.</p>
            <!-- Future: Display MC Username here using Firestore -->
        </div>

        <div class="section-card" style="border-color: var(--red);">
            <h3>Account Actions</h3>
            <p>Done playing for now?</p>
            <button class="btn-red" id="logoutBtn">Log Out</button>
        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        document.getElementById('logoutBtn').onclick = async () => {
            try {
                await signOut(auth);
                // After logging out, send them back to the login page
                window.location.href = "login.html";
            } catch (error) {
                console.error("Error signing out: ", error);
            }
        };
    </script>

    <footer>
        <p>MC Blox &copy; 2026 | Owner: Red King</p>
    </footer>
</body>
</html>
