<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Blox - Settings</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #000000;
            border-bottom: 1px solid #333;
        }

        .logo {
            color: #8a2be2; 
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1rem;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            margin-left: 15px;
            font-size: 0.9rem;
        }

        .nav-links a.active {
            color: #fff;
            font-weight: bold;
        }

        .container {
            flex: 1;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
        }

        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .card h2 {
            font-size: 1.1rem;
            margin: 0 0 10px 0;
        }

        .card p {
            color: #aaaaaa;
            font-size: 0.85rem;
            margin: 0 0 15px 0;
        }

        .account-actions {
            border: 1px solid #4a2525;
        }

        /* Big Red Log Out Button */
        .logout-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 45px; 
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: fit-content;
            transition: 0.2s;
        }

        .logout-btn:active {
            background-color: #cc0000;
            transform: scale(0.95);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.75rem;
            color: #666;
        }

        .social-section {
            margin-top: 20px;
        }

        .social-section p {
            margin-bottom: 15px;
            color: #888;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-icon {
            width: 35px;
            height: 35px;
            border: 1px solid #444;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            font-size: 0.65rem;
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">MC Blox</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="settings.html" class="active">Settings</a>
        </div>
    </nav>

    <div class="container">
        <h1>Settings</h1>
        
        <div class="card">
            <h2>User Profile</h2>
            <p>Manage your account details here.</p>
        </div>

        <div class="card account-actions">
            <h2>Account Actions</h2>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </div>
    </div>

    <footer>
        <div>MC Blox © 2026 | Owner: Red King</div>
        
        <div class="social-section">
            <p>also visit our socials</p>
            <div class="social-icons">
                <a href="#" class="social-icon">YouTube</a>
                <a href="#" class="social-icon">Insta</a>
                <a href="#" class="social-icon">FB</a>
                <a href="#" class="social-icon">Roblox</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', function() {
            // Clears any stored data that keeps you logged in
            localStorage.clear();
            sessionStorage.clear();

            // Redirects you back to the page where you log in
            // Make sure the file name below matches your login page file!
            window.location.href = 'login.html'; 
        });
    </script>

</body>
</html>
