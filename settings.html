<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Blox - Settings</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">MC Blox</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="settings.html" class="active">Settings</a>
        </div>
    </nav>

    <div class="container">
        <h1>Settings</h1>
        
        <div class="card">
            <h2>User Profile</h2>
            <p>Manage your account details here.</p>
        </div>

        <div class="card account-actions">
            <h2>Account Actions</h2>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </div>
    </div>

    <footer>
        <div>MC Blox © 2026 | Owner: Red King</div>
        
        <div class="social-section">
            <p>also visit our socials</p>
            <div class="social-icons">
                <a href="#" class="social-icon">YouTube</a>
                <a href="#" class="social-icon">Insta</a>
                <a href="#" class="social-icon">FB</a>
                <a href="#" class="social-icon">Roblox</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', function() {
            // Clears any stored data that keeps you logged in
            localStorage.clear();
            sessionStorage.clear();

            // Redirects you back to the page where you log in
            // Make sure the file name below matches your login page file!
            window.location.href = 'login.html'; 
        });
    </script>

</body>
</html>
