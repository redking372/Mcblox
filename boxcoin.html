<!DOCTYPE html>
<html>
<head>
<title>BloxCoins</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
.top {display:flex;justify-content:space-between;padding:15px;background:#1e293b;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:15px;}
.card {background:#1e293b;padding:15px;border-radius:15px;text-align:center;}
.btn {margin-top:10px;padding:8px;background:#22c55e;border:none;border-radius:10px;color:white;}
</style>

</head>

<body>

<div class="top">
  <h3>BloxCoins</h3>
  <button onclick="goBasket()">🧺</button>
</div>

<div class="grid">

<div class="card">
<img src="100bloxcoin.png" width="80">
<h4>100 Coins</h4>
<p>$0.98</p>
<button class="btn" onclick="add(100,0.98)">Add</button>
</div>

<div class="card">
<img src="300bloxcoin.png" width="80">
<h4>300 Coins</h4>
<p>$2.98</p>
<button class="btn" onclick="add(300,2.98)">Add</button>
</div>

<div class="card">
<img src="500bloxcoin.png" width="80">
<h4>500 Coins</h4>
<p>$4.98</p>
<button class="btn" onclick="add(500,4.98)">Add</button>
</div>

<div class="card">
<img src="1000bloxcoin.png" width="80">
<h4>1000 Coins</h4>
<p>$9.98</p>
<button class="btn" onclick="add(1000,9.98)">Add</button>
</div>

<div class="card">
<img src="2000bloxcoin.png" width="80">
<h4>2000 Coins</h4>
<p>$19.98</p>
<button class="btn" onclick="add(2000,19.98)">Add</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(c,p){
  cart.push({coins:c,price:p});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to basket 🧺");
}

function goBasket(){
  window.location.href="basket.html";
}
</script>

</body>
  </html>
