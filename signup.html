<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MC Blox | Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="auth-box">
        <h1 class="logo">MC Blox</h1>
        <p>Create your account</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="text" id="mcName" placeholder="Minecraft Username">
        <input type="password" id="pass" placeholder="Password">
        
        <p id="err" style="color: #ff4d4d; font-size: 12px; margin: 10px 0;"></p>
        
        <button class="btn-blue" id="signupBtn">Sign Up</button>
        <p style="font-size: 13px; margin-top: 15px;">Already have an account? <a href="login.html" style="color: var(--accent);">Log In</a></p>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const mc = document.getElementById('mcName').value;
            const errDiv = document.getElementById('err');

            if(!email || !pass || !mc) {
                errDiv.innerText = "Please fill in all fields.";
                return;
            }

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // Saving user data to your Firestore 'mcblox-bd512'
                await setDoc(doc(db, "users", res.user.uid), {
                    mcUsername: mc,
                    blocksStolen: 0,
                    role: "Player",
                    createdAt: new Date()
                });
                window.location.href = "continue.html";
            } catch (e) {
                errDiv.innerText = e.message;
            }
        };
    </script>
</body>
</html>
