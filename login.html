<!DOCTYPE html>
<html>
<head>
<title>MCBLOX Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.box{
margin-top:120px;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:220px;
border-radius:5px;
border:none;
}

button{
background:#00bfff;
color:white;
border:none;
padding:10px 20px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>MCBLOX</h1>
<h2>Log In</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Log In</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAqLisVJ9sgz56z_D0dFR1pOMaV6fFo5tw",
authDomain: "mcblox-bd512.firebaseapp.com",
projectId: "mcblox-bd512",
storageBucket: "mcblox-bd512.firebasestorage.app",
messagingSenderId: "150494713144",
appId: "1:150494713144:web:e498abc15700fdb1921dcd",
measurementId: "G-DXF8M78DRS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {

window.location.href="index.html";

})

.catch((error) => {

alert("Login failed");

});

}

</script>

</body>
</html>
