<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MC Blox | Login</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="auth-box">
        <h1 class="logo">MC Blox</h1>
        <p>Login to play</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="pass" placeholder="Password">
        
        <p id="err" style="color: #ff4d4d; font-size: 12px; margin: 10px 0;"></p>

        <button class="btn-blue" id="loginBtn">Log In</button>
        <p style="font-size: 13px; margin-top: 15px;">New to MC Blox? <a href="signup.html" style="color: var(--accent);">Sign Up</a></p>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const errDiv = document.getElementById('err');

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "continue.html";
            } catch (e) {
                errDiv.innerText = "Invalid email or password.";
            }
        };
    </script>
</body>
</html>
