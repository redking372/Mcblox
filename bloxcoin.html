<!DOCTYPE html>
<html>
<head>
  <title>BloxCoins - MCBLOX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="menu-btn">☰</div>

  <div class="logo">
    <img src="mcblox.png">
  </div>

  <div class="nav-right">
    <a href="basket.html">🛒</a>
  </div>
</div>

<div class="page-title">BloxCoins</div>

<div class="shop-container">

  <div class="shop-card" onclick="buy(this,100,0.98)">
    <img src="images/100bloxcoin.png">
  </div>

  <div class="shop-card" onclick="buy(this,300,2.98)">
    <img src="images/300bloxcoin.png">
  </div>

  <div class="shop-card" onclick="buy(this,500,4.98)">
    <img src="images/500bloxcoin.png">
  </div>

  <div class="shop-card" onclick="buy(this,1000,9.98)">
    <img src="images/1000bloxcoin.png">
  </div>

  <div class="shop-card" onclick="buy(this,2000,19.98)">
    <img src="images/2000bloxcoin.png">
  </div>

</div>

<!-- COOL FLOAT TEXT -->
<div id="floatText">+ Added 🪙</div>

<script>
function buy(el, coins, price) {
  let c = parseInt(localStorage.getItem("coins") || 0);
  let p = parseFloat(localStorage.getItem("price") || 0);

  localStorage.setItem("coins", c + coins);
  localStorage.setItem("price", (p + price).toFixed(2));

  // CLICK ANIMATION
  el.classList.add("clicked");
  setTimeout(() => el.classList.remove("clicked"), 200);

  // FLOAT TEXT
  const f = document.getElementById("floatText");
  f.classList.add("show");
  setTimeout(() => f.classList.remove("show"), 1200);
}
</script>

</body>
</html>
