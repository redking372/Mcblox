<!DOCTYPE html>
<html>
<head>
  <title>BloxCoins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="menu-btn" onclick="location.href='menu.html'">☰</div>

  <div class="logo">
    <img src="mcblox.png">
  </div>

  <div class="nav-right">
    <a href="basket.html">🛒</a>
  </div>
</div>

<!-- TITLE -->
<div class="page-title">BloxCoins</div>

<!-- COINS GRID -->
<div class="coin-container">

  <div class="coin-card" onclick="addToBasket(100,0.98)">
    <p>100 BloxCoins</p>
    <span>$0.98</span>
    <button>Add</button>
  </div>

  <div class="coin-card" onclick="addToBasket(300,2.98)">
    <p>300 BloxCoins</p>
    <span>$2.98</span>
    <button>Add</button>
  </div>

  <div class="coin-card" onclick="addToBasket(500,4.98)">
    <p>500 BloxCoins</p>
    <span>$4.98</span>
    <button>Add</button>
  </div>

  <div class="coin-card" onclick="addToBasket(1000,9.98)">
    <p>1000 BloxCoins</p>
    <span>$9.98</span>
    <button>Add</button>
  </div>

  <div class="coin-card" onclick="addToBasket(2000,19.98)">
    <p>2000 BloxCoins</p>
    <span>$19.98</span>
    <button>Add</button>
  </div>

</div>

<!-- TOAST (ANIMATION) -->
<div id="toast">Added to basket 🛒</div>

<script>
function addToBasket(coins, price) {
  let currentCoins = parseInt(localStorage.getItem("coins") || 0);
  let currentPrice = parseFloat(localStorage.getItem("price") || 0);

  localStorage.setItem("coins", currentCoins + coins);
  localStorage.setItem("price", (currentPrice + price).toFixed(2));

  showToast();
}

function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}
</script>

</body>
</html>
