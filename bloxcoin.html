<!DOCTYPE html>
<html>
<head>
  <title>BloxCoins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="menu-btn" onclick="location.href='menu.html'">☰</div>

  <div class="logo">
    <img src="mcblox.png">
  </div>

  <div class="nav-right">
    <a href="basket.html">🛒</a>
  </div>
</div>

<div class="page-title">BloxCoins</div>

<div class="coin-container">

  <div class="coin-card">
    <p>100 BloxCoins</p>
    <span>$0.98</span>
    <button onclick="addToBasket(100,0.98)">Add</button>
  </div>

  <div class="coin-card">
    <p>300 BloxCoins</p>
    <span>$2.98</span>
    <button onclick="addToBasket(300,2.98)">Add</button>
  </div>

  <div class="coin-card">
    <p>500 BloxCoins</p>
    <span>$4.98</span>
    <button onclick="addToBasket(500,4.98)">Add</button>
  </div>

  <div class="coin-card">
    <p>1000 BloxCoins</p>
    <span>$9.98</span>
    <button onclick="addToBasket(1000,9.98)">Add</button>
  </div>

  <div class="coin-card">
    <p>2000 BloxCoins</p>
    <span>$19.98</span>
    <button onclick="addToBasket(2000,19.98)">Add</button>
  </div>

</div>

<div id="toast">Added to basket 🛒</div>

<script>
function addToBasket(coins, price) {
  let c = parseInt(localStorage.getItem("coins") || 0);
  let p = parseFloat(localStorage.getItem("price") || 0);

  localStorage.setItem("coins", c + coins);
  localStorage.setItem("price", (p + price).toFixed(2));

  showToast();
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
</script>

</body>
</html>
