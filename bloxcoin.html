<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxCoins - MCBLOX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <button class="icon-btn" onclick="toggleMenu()">☰</button>
  <a class="brand" href="index.html">
    <img src="mcblox.png">
  </a>
  <a class="cart-btn" href="basket.html">🛒</a>
</header>

<section class="page-head">
  <p class="kicker">TOP UP</p>
  <h1>BloxCoins</h1>
  <p class="sub">Pick a pack and add it to your basket.</p>
</section>

<div class="content">
<div class="cards-grid">

<!-- PACKS -->
<div class="pack-card">
<img src="100bloxcoin.png">
<h2>100 BloxCoins</h2>
<p>$0.98</p>
<button onclick="buy(this,100,0.98)">Add</button>
</div>

<div class="pack-card">
<img src="300bloxcoin.png">
<h2>300 BloxCoins</h2>
<p>$2.98</p>
<button onclick="buy(this,300,2.98)">Add</button>
</div>

<div class="pack-card">
<img src="500bloxcoin.png">
<h2>500 BloxCoins</h2>
<p>$4.98</p>
<button onclick="buy(this,500,4.98)">Add</button>
</div>

<div class="pack-card">
<img src="1000bloxcoin.png">
<h2>1000 BloxCoins</h2>
<p>$9.98</p>
<button onclick="buy(this,1000,9.98)">Add</button>
</div>

<div class="pack-card">
<img src="2000bloxcoin.png">
<h2>2000 BloxCoins</h2>
<p>$19.98</p>
<button onclick="buy(this,2000,19.98)">Add</button>
</div>

</div>
</div>

<div id="toast">Added to basket 🛒</div>

<script>
function buy(btn, coins, price) {

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({coins: coins, price: price});

localStorage.setItem("cart", JSON.stringify(cart));

// animation
const card = btn.closest(".pack-card");
if (card) {
  card.classList.add("clicked");
  setTimeout(() => card.classList.remove("clicked"), 180);
}

// toast
const toast = document.getElementById("toast");
toast.classList.remove("show");
void toast.offsetWidth;
toast.classList.add("show");
setTimeout(() => toast.classList.remove("show"), 1200);

}

function toggleMenu(){
alert("Menu coming soon 😏");
}
</script>

</body>
</html>
